name: airbornegeo
channels:
  - conda-forge
  - pytorch
  - nodefaults
dependencies:
  - python=3.12
  # Required dependencies
  - geopandas
  - numpy>=1.25.0
  - pandas>=2.0.0
  - pygmt
  - scikit-learn>=1.3.0
  - scipy>=1.11.0
  - shapely
  - tqdm
  - verde
  - harmonica
  # visualization
  - ipykernel
  - ipython>=8.13.0
  - matplotlib>=3.7.0
  - nbformat
  - plotly
  - seaborn
  # test
  - pytest>=6
  - pytest-cov>=3
  # docs
  - sphinx>=7.0
  - myst-parser>=0.13
  - sphinx-copybutton
  - sphinx-autodoc-typehints
  - furo>=2023.08.17
  - nbsphinx
  - ipykernel
  - polartoolkit>=1.5
  - invert4geom
  # dev
  - jupyterlab
